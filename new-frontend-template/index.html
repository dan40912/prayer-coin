<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Start Pray | 探索禱告與故事</title>
  
  <!-- Modern Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Core Styles -->
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo">
        <img src="./img/pray_logo.png" alt="Start Pray Logo" class="logo-img" style="height: 32px; width: auto;"> Start Pray
      </a>
      <nav class="nav-links">
        <a href="index.html" class="active">探索 (Explore)</a>
        <a href="#about">關於我們</a>
        <a href="#" class="btn btn-glass" style="padding: 6px 16px;">登入</a>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <main>
    <!-- Hero Section -->
    <section class="hero">
      <div class="hero-glow"></div>
      <div class="container">
        <h1 class="text-gradient">傾聽世界的微觀聲音</h1>
        <p>在這裡，每一個祈禱都有人聆聽。留下您的故事，或是用聲音溫暖一個遠方的陌生人。</p>
        
        <div class="hero-actions" style="margin-top: 2rem;">
          <a href="create-prayer.html" class="btn btn-primary">
            <i class="fa-solid fa-pen"></i> 發布祈禱
          </a>
          <a href="#explore" class="btn btn-glass">
            <i class="fa-solid fa-headphones"></i> 聆聽故事
          </a>
        </div>

        <div class="hero-stats">
          <div class="stat-item">
            <span class="stat-value">12,450</span>
            <span class="stat-label">禱告事項</span>
          </div>
          <div class="stat-item">
            <span class="stat-value">8,932</span>
            <span class="stat-label">聲音祝福</span>
          </div>
          <div class="stat-item">
            <span class="stat-value">3,240</span>
            <span class="stat-label">同行者</span>
          </div>
        </div>
      </div>
    </section>

    <!-- Explore Section -->
    <section id="explore" class="container">
      
      <!-- Category Tabs (Rich content discovery) -->
      <div class="category-filter">
        <div class="category-filter-inner">
          <button class="category-tab active">全部 (All)</button>
          <button class="category-tab">🙏 健康與醫治</button>
          <button class="category-tab">❤️ 關係與家庭</button>
          <button class="category-tab">💼 工作與學業</button>
          <button class="category-tab">🕊️ 內心平安</button>
          <button class="category-tab">🔥 緊急代禱</button>
        </div>
      </div>

      <!-- Prayer Cards Grid -->
      <div class="cards-grid" id="prayer-cards-container">
        <!-- Cards will be populated by app.js (Fake Data) -->
        
        <!-- Example Skeleton/Static Card fallback -->
        <article class="prayer-card glass-panel" onclick="window.location.href='prayer-detail.html'">
          <div class="card-header">
            <div class="card-avatar">D</div>
            <div class="card-meta-info">
              <span class="card-author">Daniel (遠方朋友)</span>
              <span class="card-time">2 小時前</span>
            </div>
          </div>
          <div class="card-body">
            <h3 class="card-title">為即將到來的手術祈求平安</h3>
            <p class="card-excerpt">下週即將進行一場重大的心臟手術，雖然醫生說成功率很高，但內心仍然充滿恐懼。希望能有力量面對...</p>
          </div>
          <div class="card-footer">
            <div class="tags">
              <span class="tag">健康醫治</span>
              <span class="tag">恐懼</span>
            </div>
            <div class="interaction-stats">
              <div class="stat-group" title="瀏覽次數">
                <i class="fa-regular fa-eye"></i> 156
              </div>
              <div class="stat-group" title="聲音祝福/留言" style="color: var(--accent-gold)">
                <i class="fa-solid fa-microphone-lines"></i> 12
                <div class="audio-wave-mini">
                  <span></span><span></span><span></span>
                </div>
              </div>
            </div>
          </div>
        </article>
      </div>

    </section>
  </main>

  <!-- Floating Action Button -->
  <a href="create-prayer.html" class="fab-create" title="發布新祈禱">
    <i class="fa-solid fa-plus"></i>
  </a>

  <!-- Scripts -->
  <script src="./js/app.js"></script>
</body>
</html>

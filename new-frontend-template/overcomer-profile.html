<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Start Pray | 得勝者個人主頁</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/profile.css">
</head>
<body class="profile-page">

  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo">
        <img src="./img/pray_logo.png" alt="Start Pray Logo" class="logo-img" style="height: 32px; width: auto;"> Start Pray
      </a>
      <nav class="nav-links">
        <a href="index.html">探索 (Explore)</a>
        <!-- Template Dev Toggle -->
        <div class="view-toggle">
           <label class="switch">
             <input type="checkbox" id="view-mode-toggle" checked>
             <span class="slider round"></span>
           </label>
           <span id="view-mode-label" style="font-size:0.85rem; margin-left:8px; color:var(--text-light);">擁有者模式</span>
        </div>
      </nav>
    </div>
  </header>

  <main>
    <!-- Profile Hero Section -->
    <section class="profile-hero">
      <div class="profile-cover"></div>
      <div class="container profile-header-content">
        
        <div class="profile-avatar-wrapper">
          <div class="profile-avatar">
            <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&w=320&q=80" alt="Avatar" id="user-avatar-img">
            <!-- Upload Avatar Overlay (Owner Only) -->
            <label class="avatar-upload-overlay owner-only" title="上傳新大頭貼">
              <i class="fa-solid fa-camera"></i>
              <input type="file" id="avatar-input" accept="image/*" style="display: none;">
            </label>
          </div>
          <!-- Follow Badge (Visitor Only) -->
          <div class="visitor-only avatar-badge">
             <i class="fa-solid fa-star"></i>
          </div>
        </div>

        <div class="profile-info">
          <div class="profile-title-row">
            <h1 id="user-display-name">Daniel <span class="badge-role">得勝者</span></h1>
            <div class="profile-actions">
              <!-- Owner Actions -->
              <button class="btn btn-glass owner-only" id="btn-edit-profile" title="編輯個人資料"><i class="fa-solid fa-pen"></i></button>
              <!-- Visitor Actions -->
              <button class="btn btn-primary visitor-only" id="btn-follow-user"><i class="fa-solid fa-plus"></i> 追蹤</button>
              <button class="btn btn-glass visitor-only" title="檢舉此用戶"><i class="fa-solid fa-flag"></i></button>
              
              <button class="btn btn-glass" id="btn-share-profile" title="分享主頁"><i class="fa-solid fa-share-nodes"></i></button>
            </div>
          </div>
          
          <p class="profile-bio" id="user-bio">
            「凡事包容，凡事相信，凡事盼望，凡事忍耐。」 歡迎來到我的禱告空間，讓我們互相扶持。
          </p>

          <div class="profile-stats">
            <div class="stat-block">
              <span class="stat-number">24</span>
              <span class="stat-label">發布禱告</span>
            </div>
            <div class="stat-block">
              <span class="stat-number">128</span>
              <span class="stat-label">聲音祝福</span>
            </div>
            <div class="stat-block owner-only">
              <span class="stat-number" style="color:var(--accent-cyan);">1.5k</span>
              <span class="stat-label">獲得代幣</span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Profile Content Section -->
    <section class="container profile-content-tabs">
      <div class="category-filter">
        <div class="category-filter-inner profile-tabs">
          <button class="category-tab active" data-tab="my-prayers">我的禱告 (<span id="count-prayers">3</span>)</button>
          <button class="category-tab" data-tab="my-responses">我的回應 (<span id="count-responses">12</span>)</button>
        </div>
      </div>

      <!-- Tab Area: My Prayers -->
      <div class="tab-pane active" id="pane-my-prayers">
        <div class="cards-grid" id="profile-prayers-container">
          <!-- Populated by app.js or static dummy below -->
        </div>
      </div>

      <!-- Tab Area: My Responses -->
      <div class="tab-pane" id="pane-my-responses" style="display: none;">
        <div class="responses-timeline" id="profile-responses-container">
          <!-- Populated by app.js -->
        </div>
      </div>
    </section>
  </main>

  <!-- Edit Profile Modal -->
  <div class="record-modal-overlay" id="edit-profile-overlay"></div>
  <div class="record-modal glass-panel" id="edit-profile-modal">
    <button class="btn-icon close-modal" id="close-edit-profile"><i class="fa-solid fa-xmark"></i></button>
    <div class="record-state">
      <h3>編輯個人資料</h3>
      <p style="margin-bottom: 20px;">更改您的顯示名稱與介紹。</p>
      
      <div class="form-group" style="text-align: left;">
        <label for="edit-name">顯示名稱</label>
        <input type="text" id="edit-name" value="Daniel">
      </div>
      
      <div class="form-group" style="text-align: left;">
        <label for="edit-bio">個人介紹</label>
        <textarea id="edit-bio" rows="4">「凡事包容，凡事相信，凡事盼望，凡事忍耐。」 歡迎來到我的禱告空間，讓我們互相扶持。</textarea>
      </div>

      <button class="btn btn-primary btn-large mt-4" id="btn-save-profile" style="width: 100%;">儲存變更</button>
    </div>
  </div>

  <script src="./js/app.js"></script>
</body>
</html>
